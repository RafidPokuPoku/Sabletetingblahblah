plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '1.0.14'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

repositories {
    mavenLocal()
    maven { url = "https://maven.neoforged.net/releases" }
    maven { url = "https://maven.parchmentmc.org" }

    // Official Create and Ponder Hosting
    maven { url = "https://maven.createmod.net" }
    maven { url = "https://maven.tterrag.com" }

    // REQUIRED: This is where forgeconfigapiport lives
    maven { url = "https://raw.githubusercontent.com/Fuzss/modresources/main/maven/" }

    mavenCentral()
}

base {
    archivesName = 'oretory'
}

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', 'oretory'
        }
    }

    mods {
        oretory {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    // Verified 1.21.1 Ponder Lib
    implementation "net.createmod.ponder:Ponder-NeoForge-1.21.1:1.0.46"
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: "[1.21.1, 1.22)",
            neo_version            : neo_version,
            neo_version_range      : "[21.1.66,)",
            loader_version_range   : "[4,)",
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : "Rafid",
            mod_description        : "An automated mining mod."
    ]
    inputs.properties(replaceProperties)

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand(replaceProperties)
    }
}